<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pizzaBase" cx="50%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#FFE0B2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFCC80;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="pepperoni" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#D32F2F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="background" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="8" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#background)"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="30" fill="#FFD54F" opacity="0.3"/>
  <circle cx="700" cy="500" r="40" fill="#FF8A65" opacity="0.3"/>
  <circle cx="750" cy="150" r="25" fill="#FFF176" opacity="0.3"/>
  
  <!-- Main pizza -->
  <circle cx="400" cy="300" r="200" fill="url(#pizzaBase)" filter="url(#shadow)"/>
  
  <!-- Crust -->
  <circle cx="400" cy="300" r="200" fill="none" stroke="#D4A574" stroke-width="20"/>
  
  <!-- Cheese base -->
  <circle cx="400" cy="300" r="180" fill="#FFF8E1" opacity="0.95"/>
  
  <!-- Pepperoni slices -->
  <circle cx="340" cy="240" r="25" fill="url(#pepperoni)"/>
  <circle cx="340" cy="240" r="22" fill="none" stroke="#8D1E1E" stroke-width="2"/>
  
  <circle cx="460" cy="260" r="25" fill="url(#pepperoni)"/>
  <circle cx="460" cy="260" r="22" fill="none" stroke="#8D1E1E" stroke-width="2"/>
  
  <circle cx="380" cy="340" r="25" fill="url(#pepperoni)"/>
  <circle cx="380" cy="340" r="22" fill="none" stroke="#8D1E1E" stroke-width="2"/>
  
  <circle cx="420" cy="360" r="25" fill="url(#pepperoni)"/>
  <circle cx="420" cy="360" r="22" fill="none" stroke="#8D1E1E" stroke-width="2"/>
  
  <circle cx="400" cy="200" r="25" fill="url(#pepperoni)"/>
  <circle cx="400" cy="200" r="22" fill="none" stroke="#8D1E1E" stroke-width="2"/>
  
  <circle cx="320" cy="320" r="25" fill="url(#pepperoni)"/>
  <circle cx="320" cy="320" r="22" fill="none" stroke="#8D1E1E" stroke-width="2"/>
  
  <circle cx="480" cy="320" r="25" fill="url(#pepperoni)"/>
  <circle cx="480" cy="320" r="22" fill="none" stroke="#8D1E1E" stroke-width="2"/>
  
  <!-- Mushrooms -->
  <path d="M350 280 Q365 265 380 280 Q365 295 350 280" fill="#8D6E63"/>
  <ellipse cx="365" cy="285" rx="8" ry="5" fill="#5D4037"/>
  
  <path d="M430 300 Q445 285 460 300 Q445 315 430 300" fill="#8D6E63"/>
  <ellipse cx="445" cy="305" rx="8" ry="5" fill="#5D4037"/>
  
  <!-- Bell peppers -->
  <path d="M300 280 Q315 265 330 280 Q315 295 300 280" fill="#4CAF50"/>
  <path d="M470 380 Q485 365 500 380 Q485 395 470 380" fill="#FF5722"/>
  <path d="M360 380 Q375 365 390 380 Q375 395 360 380" fill="#FF9800"/>
  
  <!-- Large cheese strings -->
  <path d="M320 250 Q350 265 380 250" stroke="#FFFDE7" stroke-width="8" fill="none" opacity="0.9"/>
  <path d="M420 280 Q450 295 480 280" stroke="#FFFDE7" stroke-width="8" fill="none" opacity="0.9"/>
  <path d="M340 350 Q370 365 400 350" stroke="#FFFDE7" stroke-width="8" fill="none" opacity="0.9"/>
  <path d="M300 320 Q330 335 360 320" stroke="#FFFDE7" stroke-width="6" fill="none" opacity="0.9"/>
  
  <!-- Herbs/seasoning -->
  <circle cx="370" cy="270" r="1.5" fill="#2E7D32"/>
  <circle cx="430" cy="280" r="1.5" fill="#2E7D32"/>
  <circle cx="410" cy="220" r="1.5" fill="#2E7D32"/>
  <circle cx="350" cy="310" r="1.5" fill="#2E7D32"/>
  <circle cx="450" cy="340" r="1.5" fill="#2E7D32"/>
  <circle cx="390" cy="380" r="1.5" fill="#2E7D32"/>
  
  <!-- Steam effect -->
  <path d="M250 150 Q260 140 270 150 Q280 140 290 150" stroke="#FFF" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M520 150 Q530 140 540 150 Q550 140 560 150" stroke="#FFF" stroke-width="4" fill="none" opacity="0.6"/>
  <path d="M380 120 Q390 110 400 120 Q410 110 420 120" stroke="#FFF" stroke-width="4" fill="none" opacity="0.6"/>
  
  <!-- Text overlay -->
  <text x="400" y="550" font-family="'Noto Sans KR', Arial, sans-serif" font-size="36" font-weight="700" fill="#DC143C" text-anchor="middle">빨간토마토피자</text>
  <text x="400" y="580" font-family="'Noto Sans KR', Arial, sans-serif" font-size="18" fill="#666" text-anchor="middle">피자 장인이 만드는 진정한 맛</text>
</svg>