<svg width="220" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#DC143C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle for tomato -->
  <circle cx="40" cy="40" r="30" fill="url(#redGradient)" filter="url(#shadow)"/>
  
  <!-- Tomato stem -->
  <path d="M35 15 Q40 10 45 15" stroke="#4CAF50" stroke-width="3" fill="none"/>
  <path d="M32 18 Q37 13 42 18" stroke="#4CAF50" stroke-width="2" fill="none"/>
  
  <!-- Tomato highlight -->
  <ellipse cx="35" cy="35" rx="8" ry="12" fill="#FF8A80" opacity="0.7"/>
  
  <!-- Pizza slice in tomato -->
  <path d="M25 40 L55 40 L40 25 Z" fill="#FFD54F" opacity="0.8"/>
  <circle cx="30" cy="37" r="2" fill="#FF5722"/>
  <circle cx="45" cy="37" r="2" fill="#4CAF50"/>
  <circle cx="38" cy="32" r="1.5" fill="#FFF"/>
  
  <!-- Main text -->
  <text x="85" y="32" font-family="'Noto Sans KR', Arial, sans-serif" font-size="20" font-weight="700" fill="#DC143C">빨간토마토</text>
  <text x="85" y="55" font-family="'Noto Sans KR', Arial, sans-serif" font-size="20" font-weight="700" fill="#333">PIZZA</text>
  
  <!-- Tagline -->
  <text x="85" y="70" font-family="'Noto Sans KR', Arial, sans-serif" font-size="10" fill="#666">피자 장인이 만드는 진정한 맛</text>
</svg>